<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="A beautiful dark-mode weather widget displaying current conditions and forecast">
  <title>Weather Widget — Dark Mode and light mode</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="scene">
    <!-- Ambient floating orbs -->
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div class="widget" id="weather-widget">
      <!-- Header -->
      <div class="widget-header">
        <div class="location">
          <svg class="icon-pin" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z" />
            <circle cx="12" cy="10" r="3" />
          </svg>
          <span id="city-name">San Francisco</span>
        </div>
        <div class="date-time" id="date-time">Fri, Mar 27</div>
      </div>

      <!-- Main weather display -->
      <div class="weather-main">
        <div class="weather-icon-wrap">
          <div class="weather-icon" id="weather-icon">
            <!-- Sun with animated rays -->
            <svg class="sun-icon" viewBox="0 0 120 120">
              <defs>
                <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
                  <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4" />
                  <stop offset="100%" stop-color="#FFD700" stop-opacity="0" />
                </radialGradient>
                <linearGradient id="sunBody" x1="0%" y1="0%" x2="100%" y2="100%">
                  <stop offset="0%" stop-color="#FFE066" />
                  <stop offset="100%" stop-color="#FFA500" />
                </linearGradient>
              </defs>
              <circle cx="60" cy="60" r="55" fill="url(#sunGlow)" class="sun-glow" />
              <circle cx="60" cy="60" r="24" fill="url(#sunBody)" class="sun-body" />
              <g class="sun-rays">
                <line x1="60" y1="8" x2="60" y2="22" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <line x1="60" y1="98" x2="60" y2="112" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <line x1="8" y1="60" x2="22" y2="60" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <line x1="98" y1="60" x2="112" y2="60" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <line x1="23" y1="23" x2="33" y2="33" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <line x1="87" y1="87" x2="97" y2="97" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <line x1="97" y1="23" x2="87" y2="33" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
                <line x1="33" y1="87" x2="23" y2="97" stroke="#FFD700" stroke-width="3" stroke-linecap="round" />
              </g>
              <g class="cloud-partial" opacity="0.9">
                <ellipse cx="72" cy="82" rx="22" ry="14" fill="#4a5568" />
                <ellipse cx="58" cy="78" rx="16" ry="12" fill="#5a6a7e" />
                <ellipse cx="82" cy="78" rx="14" ry="10" fill="#4a5568" />
              </g>
            </svg>
          </div>
        </div>
        <div class="weather-info">
          <div class="temperature">
            <span class="temp-value" id="temp-value">22</span>
            <span class="temp-unit">°C</span>
          </div>
          <div class="condition" id="condition">Partly Cloudy</div>
          <div class="feels-like">Feels like <span id="feels-like">20</span>°C</div>
        </div>
      </div>

      <!-- Stats row -->
      <div class="weather-stats">
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 2.69l5.66 5.66a8 8 0 1 1-11.31 0z" />
          </svg>
          <div class="stat-info">
            <span class="stat-value" id="humidity">68%</span>
            <span class="stat-label">Humidity</span>
          </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9.59 4.59A2 2 0 1 1 11 8H2m10.59 11.41A2 2 0 1 0 14 16H2m15.73-8.27A2.5 2.5 0 1 1 19.5 12H2" />
          </svg>
          <div class="stat-info">
            <span class="stat-value" id="wind">14 km/h</span>
            <span class="stat-label">Wind</span>
          </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat">
          <svg class="stat-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="5" />
            <line x1="12" y1="1" x2="12" y2="3" />
            <line x1="12" y1="21" x2="12" y2="23" />
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
            <line x1="1" y1="12" x2="3" y2="12" />
            <line x1="21" y1="12" x2="23" y2="12" />
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <div class="stat-info">
            <span class="stat-value" id="uv">5</span>
            <span class="stat-label">UV Index</span>
          </div>
        </div>
      </div>

      <!-- Hourly forecast -->
      <div class="forecast-section">
        <h2 class="section-title">Hourly Forecast</h2>
        <div class="hourly-forecast" id="hourly-forecast">
          <!-- Filled by JS -->
        </div>
      </div>

      <!-- 5-day forecast -->
      <div class="forecast-section">
        <h2 class="section-title">5-Day Forecast</h2>
        <div class="daily-forecast" id="daily-forecast">
          <!-- Filled by JS -->
        </div>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
</body>

</html>
